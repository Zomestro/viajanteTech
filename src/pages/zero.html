<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta author="Emerson Moron Rosa, Italo Araujo Santos, Daniel de Lima Pereira">
    <title>Tela de Abertura</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="home-page">
    <div class="container">
        <h1>Bem-vindo ao TRIP PLANNER</h1>
        <<button id="instant-page-button-element" data-url="/media/sounds/win31.mp3" onclick="Iniciar('/media/sounds/win31.mp3', 'loader-', 'windows-31-startup-tada')" </button>
    </div>

    <audio id="som-inicial" src="../midia/win31.mp3"></audio>

    <script>
        const botao = document.getElementById('btn-iniciar');
        const som = document.getElementById('som-inicial');

        if (botao) {
            botao.addEventListener('click', () => {
                if (som && typeof som.play === 'function') {
                    som.play().catch(() => {});
                }
                window.location.href = 'index.html';
            });
        }
    </script>
</body>
</html>
